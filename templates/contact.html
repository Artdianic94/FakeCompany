<!DOCTYPE html>
<html>
<head>
<title>Contact</title>
</head>

<body>

<h2>Feedback</h2>

<form method="POST">

<textarea name="message"></textarea>

<br><br>

<input type="submit" value="Send">

</form>

<h3>Messages</h3>

{% for message in messages %}

<div>
{{ message|safe }}
</div>

<hr>

{% endfor %}

<a href="/">Back</a>

</body>
</html>
